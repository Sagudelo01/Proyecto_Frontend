<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OutfitShop</title>
    <!-- css -->
    <link rel="stylesheet" href="../css/main.css" />
    <!-- bostrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="wrapper">
      <aside>
        <header>
          <h1 class="logo">OutfitShop</h1>
        </header>

        <nav>
          <ul class="menu">
            <li>
              <button id= "todos"class="btn-menu btn-categoria active">
                <i class="bi bi-hand-index-thumb-fill"></i>Todos los productos
              </button>
            </li>

            <li>
              <button id= "abrigos" class="btn-menu btn-categoria">
                <i class="bi bi-hand-index-thumb"></i>Abrigos
              </button>
            </li>

            <li>
              <button id= "camisetas" class="btn-menu btn-categoria">
                <i class="bi bi-hand-index-thumb"></i>Camisetas
              </button>
            </li>

            <li>
              <button id= "pantalones" class="btn-menu btn-categoria">
                <i class="bi bi-hand-index-thumb"></i>Pantalones
              </button>
            </li>

            <li>
              <a class="btn-menu btn-carrito" href="./Carrito.html"
                ><i class="bi bi-cart-fill"></i>Carrito
                <span class="numerito">0</span></a
              >
            </li>
          </ul>
        </nav>

        <footer>
          <p class="TextoFooter">&copy; 2025 OutfitShop</p>
        </footer>
      </aside>

      <main>
        <h2 class="Tituloprincipal">Todos los Productos</h2>
        <div id="contenedor-productos" class="contenedor-productos">
          <!--  Esto se rellena con JS -->
        </div>
      </main>
    </div>

    <!-- JavaScript -->
    <script src="../java/main.js"></script>
  </body>


</html>
